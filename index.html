<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversor de Arquivo para Docx</title>
<script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>

    <input type="file" id="arquivoEntrada" />
    <button onclick="processarArquivo()">Converter e Baixar Docx</button>

    <script>
    function createDocxModel2(texto) {
        const doc = new docx.Document({
            sections: [{
                properties: {},
                children: [
                    new docx.Paragraph({
                        children: [
                            new docx.TextRun(texto)
                        ]
                    })
                ]
            }]
        });
        return doc;
    }

    async function processarModelo2(conteudo) {
        try {
            const modeloDocx = createDocxModel2(conteudo);
            const blob = await docx.Packer.toBlob(modeloDocx);
            saveAs(blob, "documento_convertido.docx");
        } catch (erro) {
            console.error(erro);
            alert("Ocorreu um erro durante a conversão do documento.");
        }
    }

    function processarArquivo() {
        const inputArquivo = document.getElementById('arquivoEntrada');
        
        if (!inputArquivo.files || inputArquivo.files.length === 0) {
            alert("Por favor, selecione um arquivo primeiro.");
            return;
        }

        const arquivo = inputArquivo.files[0];
        const reader = new FileReader();

        reader.onload = function(evento) {
            const conteudo = evento.target.result;
            processarModelo2(conteudo);
        };

        reader.onerror = function() {
            console.error("Erro ao ler o arquivo.");
        };

        reader.readAsText(arquivo);
    }
    </script>
</body>
</html>
