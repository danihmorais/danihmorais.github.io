name: Deploy static content to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: |
            MONTAEDITAL/package-lock.json
            LICITA.AI/package-lock.json

      - name: Build MontaEdital
        working-directory: ./MONTAEDITAL
        run: |
          npm install
          npm run build

      - name: Build Licita.AI
        working-directory: ./LICITA.AI
        run: |
          npm install
          npm run build

      - name: Assemble final site
        run: |
          mkdir -p site
          cp index.html site/
          cp -r assets site/
          cp -r MONTAEDITAL/dist site/MONTAEDITAL
          cp -r LICITA.AI/dist site/LICITA.AI
          mkdir -p site/FIORIILICSVTOWORD
          cp -r FIORIILICSVTOWORD/. site/FIORIILICSVTOWORD/

          # documentos-modelo também é HTML/JS puro (sem build) — busca os
          # arquivos da pasta "Documentos Modelo" direto do repo via API do
          # GitHub em tempo de execução, então só a página precisa ser copiada.
          mkdir -p site/documentos-modelo
          cp -r documentos-modelo/. site/documentos-modelo/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4